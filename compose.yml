services:
  selenium:
    image: docker.io/selenium/standalone-chromium
    container_name: selenium
    ports:
      - "${SELENIUM_PORT:-4444}:4444"
      # --- Uncomment for manual login---
      # - "${NOVNC_PORT:-7900}:7900"
    shm_size: '2g'
    networks:
      - ljpa-network
    environment:
      - SE_VNC_NO_PASSWORD=1
      # Disable VNC/NoVNC for lightweight operation
      - SE_START_VNC=false
      - SE_START_NO_VNC=false
      # --- Set to true for manual login ---
      # - SE_START_VNC=true
      # - SE_START_NO_VNC=true
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:4444/wd/hub/status" ]
      interval: 1s
      timeout: 3s
      retries: 30

  linkedin-bot:
    build: .
    container_name: linkedin-bot
    depends_on:
      selenium:
        condition: service_healthy
    volumes:
      - ./resources:/app/resources:Z
      - ./src:/app/src:Z
    env_file:
      - .env
    networks:
      - ljpa-network

  sqlite-ui:
    build:
      context: .
      dockerfile: Dockerfile.sqlite-web
    container_name: sqlite-ui
    ports:
      - "${DB_WEBUI_PORT:-7901}:8080"
    volumes:
      - ./resources:/data:Z
    # Overriding command to ensure it uses the correct host and port within the container
    command: ["app.db", "-H", "0.0.0.0", "-p", "8080"]
    networks:
      - ljpa-network
    
networks:
  ljpa-network:
    driver: bridge
