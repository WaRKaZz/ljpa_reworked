services:
  selenium:
    image: docker.io/selenium/standalone-chromium
    container_name: selenium
    ports:
      - "4444:4444"
      - "${NOVNC_PORT:-7900}:7900"
    shm_size: '2g'
    networks:
      - ljpa-network
    environment:
      - SE_VNC_NO_PASSWORD=1
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:4444/wd/hub/status" ]
      interval: 1s
      timeout: 3s
      retries: 30

  linkedin-bot:
    build: .
    container_name: linkedin-bot
    depends_on:
      selenium:
        condition: service_healthy
    volumes:
      - ./resources:/app/resources:Z
      - ./src:/app/src:Z
    env_file:
      - .env
    networks:
      - ljpa-network
    
networks:
  ljpa-network:
    driver: bridge
